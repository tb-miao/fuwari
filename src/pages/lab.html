<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>

        ::selection {
            background-color: #eb3a92; /* 嫩粉色 */
            color: #fffefe; /* 选择文本的颜色，这里设置为黑色以便更好的阅读 */
        }
        
        :root {
            --main-color: #FFB7DD; /* 主色调粉色 */
            --accent-color: #B28CFF; /* 辅助色紫色 */
        }

        /* 在body样式中添加背景图片 */
        body {
            margin: 0;
            height: 100vh;
            background: 
                linear-gradient(135deg, rgba(255, 242, 249, 0.11) 0%, rgba(232, 243, 255, 0.123) 100%),
                url('https://tbmiao.dpdns.org/images/lt/0072Vf1pgy1foxk6u83cvj31hc0u0wxh.jpg') center/cover fixed;
            font-family: 'Comic Sans MS', '微軟正黑體', cursive;
            overflow-x: hidden;
            position: relative;
        }

        /* 新增背景遮罩层 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            z-index: -1;
        }

        /* 修改后的樱花样式 */
        .sakura {
            position: fixed;
            width: 20px;  /* 调大尺寸 */
            height: 20px;
            background: url('data:image/svg+xml,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="%23ff9eb5" stroke="%23ff7aa0" stroke-width="1.5"/></svg>');
            pointer-events: none;
            animation: fall linear infinite;
            filter: drop-shadow(0 0 2px rgba(255, 155, 180, 0.5)); /* 添加光影效果 */
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        /* 主容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
        }

        /* 头像区域 */
        .avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid var(--main-color);
            box-shadow: 0 0 20px rgba(255, 183, 221, 0.5);
            transition: transform 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 导航按钮 */
        .nav-button {
            background: white;
            padding: 1rem 2rem;
            border-radius: 30px;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(178, 140, 255, 0.3);
        }

        /* 动态边框效果 */
        .magic-border {
            position: relative;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
        }

        .magic-border::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(45deg, var(--main-color), var(--accent-color));
            border-radius: inherit;
            z-index: -1;
            animation: border-light 2s linear infinite;
        }

        @keyframes border-light {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* footer */
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1rem;
            font-size: 0.9rem;
            text-align: center;
        }

    </style>
</head>
<body>
    <!-- 樱花飘落效果 -->
    <script>
        function createSakura() {
            const sakura = document.createElement('div');
            sakura.className = 'sakura';
            sakura.style.left = Math.random() * 100 + 'vw';
            sakura.style.animationDuration = Math.random() * 3 + 5 + 's';
            sakura.style.opacity = Math.random();
            document.body.appendChild(sakura);
            
            setTimeout(() => sakura.remove(), 8000);
            // 在createSakura函数中添加大小随机化
        sakura.style.transform = `scale(${Math.random() * 0.5 + 0.8})`; // 0.8-1.3倍随机缩放
        }
        
        setInterval(createSakura, 300);
    </script>
